name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-main:
    name: Build Main App (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze

      - name: Rust check
        working-directory: rust
        run: cargo check

      - name: Sort smoke test
        run: flutter test tools/test/sort_smoke_test.dart

      - name: Build Windows release
        run: flutter build windows --release

      - name: Download BASS dlls
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path build\tmp -Force | Out-Null
          New-Item -ItemType Directory -Path build\windows\x64\runner\Release\BASS -Force | Out-Null

          curl.exe -L -o bass.zip https://www.un4seen.com/files/bass24.zip
          curl.exe -L -o bassape24.zip https://www.un4seen.com/files/bassape24.zip
          curl.exe -L -o bassdsd24.zip https://www.un4seen.com/files/bassdsd24.zip
          curl.exe -L -o bassflac24.zip https://www.un4seen.com/files/bassflac24.zip
          curl.exe -L -o bassmidi24.zip https://www.un4seen.com/files/bassmidi24.zip
          curl.exe -L -o bassopus24.zip https://www.un4seen.com/files/bassopus24.zip
          curl.exe -L -o basswv24.zip https://www.un4seen.com/files/basswv24.zip
          curl.exe -L -o bassaac24.zip https://www.un4seen.com/files/bassaac24.zip

          Expand-Archive -Path bass.zip -DestinationPath build\tmp -Force
          Expand-Archive -Path bassape24.zip -DestinationPath build\tmp -Force
          Expand-Archive -Path bassdsd24.zip -DestinationPath build\tmp -Force
          Expand-Archive -Path bassflac24.zip -DestinationPath build\tmp -Force
          Expand-Archive -Path bassmidi24.zip -DestinationPath build\tmp -Force
          Expand-Archive -Path bassopus24.zip -DestinationPath build\tmp -Force
          Expand-Archive -Path basswv24.zip -DestinationPath build\tmp -Force
          Expand-Archive -Path bassaac24.zip -DestinationPath build\tmp -Force

          Copy-Item -Path build\tmp\x64\*.dll -Destination build\windows\x64\runner\Release\BASS -Force

      - name: Get desktop_lyric dependencies
        working-directory: third_party/desktop_lyric
        run: flutter pub get

      - name: Build bundled desktop_lyric release
        working-directory: third_party/desktop_lyric
        run: flutter build windows --release

      - name: Bundle desktop_lyric with main app
        shell: pwsh
        run: |
          $source = "third_party\desktop_lyric\build\windows\x64\runner\Release"
          $target = "build\windows\x64\runner\Release\desktop_lyric"
          if (!(Test-Path (Join-Path $source "desktop_lyric.exe")) -or !(Test-Path (Join-Path $source "flutter_windows.dll")) -or !(Test-Path (Join-Path $source "data"))) {
            throw "desktop_lyric release bundle is incomplete: $source"
          }
          if (Test-Path $target) {
            Remove-Item $target -Recurse -Force
          }
          New-Item -ItemType Directory -Path $target -Force | Out-Null
          Copy-Item -Path (Join-Path $source "*") -Destination $target -Recurse -Force

      - name: Upload main artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Qisheng-Player-Windows
          path: build\windows\x64\runner\Release\*

  build-desktop-lyric:
    name: Build Desktop Lyric (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"

      - name: Get desktop_lyric dependencies
        working-directory: third_party/desktop_lyric
        run: flutter pub get

      - name: Analyze desktop_lyric
        working-directory: third_party/desktop_lyric
        run: flutter analyze --no-fatal-infos

      - name: Build desktop_lyric release
        working-directory: third_party/desktop_lyric
        run: flutter build windows --release

      - name: Upload desktop_lyric artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Desktop-Lyric-Windows
          path: third_party\desktop_lyric\build\windows\x64\runner\Release\*
