name: coriander_player
description: Windows 本地音乐播放器（Fork 维护版），基于 Flutter + Rust 构建。
publish_to: 'none'
version: 1.7.1

environment:
  sdk: '>=3.1.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.0.1 
  material_color_utilities: ^0.13.0
  window_manager: ^0.3.8
  provider: ^6.1.1
  # rust_builder:
  #   path: rust_builder
  # flutter_rust_bridge: ^2.8.0
  path_provider: ^2.0.15
  flutter_localizations:
    sdk: flutter
  ffi: ^2.1.0
  path: ^1.8.3
  material_symbols_icons: ^4.2719.1
  github: ^9.24.0
  flutter_markdown: ^0.7.1
  flex_color_picker: ^3.5.0
  filepicker_windows: ^2.1.4
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  palette_generator: ^0.3.3+7
  desktop_lyric:
    path: third_party/desktop_lyric
  music_api:
    git:
      url: https://github.com/Ferry-200/music_api_dart.git
      ref: c6f3e0abd9c6295b3678ce10d30bc09debda9abe
  pinyin: ^3.3.0
  hotkey_manager: ^0.2.3
  logger: ^2.4.0
  flutter_rust_bridge: 2.11.1
  rust_lib_coriander_player:
    path: rust_builder
  shadcn_flutter: ^0.0.52

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  integration_test:
    sdk: flutter
  ffigen: ^14.0.1

flutter:
  uses-material-design: true
  assets:
    - app_icon.ico
